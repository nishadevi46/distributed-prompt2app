#k8s/infra/namespaces.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: prompt-core

---
# to create separate ns for previews

apiVersion: v1
kind: Namespace
metadata:
  name: prompt-previews

---
# configmap for shared config values across services 

apiVersion: v1
kind: ConfigMap
metadata:
  name: prompt-shared-config
  namespace: prompt-core
data:
  PREVIEW_DOMAIN: ".previews.8.231.116.253.nip.io"
  PREVIEW_NAMESPACE: "prompt-previews"
  PROXY_PORT: "80"
  APP_FRONTEND_URL: "http://promptapp.8.231.116.253.nip.io"