apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt-frontend
  namespace: prompt-core
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prompt-frontend
  template:
    metadata:
      labels:
        app: prompt-frontend
    spec:
      containers:
        - name: prompt-frontend
          image: nishadevi333/prompt-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi