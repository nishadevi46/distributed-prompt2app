apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt-frontend
  namespace: prompt-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prompt-frontend
  template:
    metadata:
      labels:
        app: prompt-frontend
    spec:
      containers:
        - name: prompt-frontend
          image: nishadevi333/prompt-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: prompt-frontend
  namespace: prompt-core
spec:
  type: ClusterIP
  selector:
    app: prompt-frontend
  ports:
    - port: 80
      targetPort: 80